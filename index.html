<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>משחק הזיכרון המשפחתי</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cols: 4;
      --rows: 3;
      --gap:  8px;
      --pad:  10px;
      --clr-easy:   #27ae60;
      --clr-medium: #e67e22;
      --clr-hard:   #c0392b;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      direction: rtl;
    }

    .hidden { display: none !important; }

    /* ============================================================
       START SCREEN
    ============================================================ */
    #start-screen {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .start-card {
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      padding: 36px 32px;
      max-width: 460px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }

    .start-logo { font-size: 3rem; }

    .start-card h1 {
      font-size: 1.5rem;
      color: #333;
      margin: 10px 0 24px;
    }

    /* Name input */
    .field-label {
      display: block;
      text-align: right;
      font-size: 0.9rem;
      font-weight: 700;
      color: #555;
      margin-bottom: 6px;
    }

    #player-name {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid #ddd;
      border-radius: 12px;
      font-size: 1rem;
      font-family: inherit;
      direction: rtl;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 22px;
    }

    #player-name:focus { border-color: #667eea; }

    /* Level selection on start screen */
    .start-levels-label {
      display: block;
      text-align: right;
      font-size: 0.9rem;
      font-weight: 700;
      color: #555;
      margin-bottom: 10px;
    }

    .start-level-btns {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 22px;
    }

    .start-level-btn {
      background: #f5f5f5;
      border: 2px solid #e0e0e0;
      border-radius: 14px;
      padding: 12px 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      color: #555;
      transition: all 0.18s;
      line-height: 1.5;
    }

    .start-level-btn small { font-weight: 400; font-size: 0.75rem; color: #888; display: block; }
    .start-level-btn:hover { border-color: #aaa; background: #eee; }

    .start-level-btn[data-level="easy"].selected   { background: #e8f8ef; border-color: var(--clr-easy);   color: var(--clr-easy);   }
    .start-level-btn[data-level="medium"].selected { background: #fef3e8; border-color: var(--clr-medium); color: var(--clr-medium); }
    .start-level-btn[data-level="hard"].selected   { background: #fdecea; border-color: var(--clr-hard);   color: var(--clr-hard);   }

    /* Main action button */
    #start-game-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 1.05rem;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 10px;
      transition: opacity 0.2s, transform 0.1s;
    }

    #start-game-btn:hover { transform: scale(1.02); }

    #show-lb-btn {
      width: 100%;
      padding: 10px;
      background: transparent;
      color: #667eea;
      border: 2px solid #667eea;
      border-radius: 14px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s;
    }

    #show-lb-btn:hover { background: #667eea; color: white; }

    /* ============================================================
       LEADERBOARD SCREEN
    ============================================================ */
    #leaderboard-screen {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .lb-card {
      background: rgba(255,255,255,0.96);
      border-radius: 24px;
      padding: 28px 24px;
      max-width: 620px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .lb-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .lb-card h2 { font-size: 1.4rem; color: #333; }

    .lb-top-btns { display: flex; gap: 8px; }

    .btn-ghost {
      background: transparent;
      border: 2px solid #ddd;
      border-radius: 10px;
      padding: 6px 12px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.82rem;
      color: #666;
      transition: all 0.18s;
    }

    .btn-ghost:hover { border-color: #aaa; color: #333; }
    .btn-ghost.danger:hover { border-color: #e74c3c; color: #e74c3c; }

    /* Tabs */
    .lb-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .lb-tab {
      background: #f0f0f0;
      border: none;
      border-radius: 10px;
      padding: 6px 14px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      color: #666;
      transition: all 0.18s;
    }

    .lb-tab:hover { background: #e0e0e0; }
    .lb-tab.active { background: #667eea; color: white; }

    /* Table */
    .lb-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    .lb-table th {
      padding: 8px 10px;
      text-align: center;
      color: #888;
      font-weight: 600;
      border-bottom: 2px solid #eee;
    }

    .lb-table td {
      padding: 9px 10px;
      text-align: center;
      border-bottom: 1px solid #f0f0f0;
    }

    .lb-table tr:last-child td { border-bottom: none; }
    .lb-table tr:hover td { background: #fafafa; }

    .lb-table td:nth-child(2) { font-weight: 700; color: #333; text-align: right; }

    .level-badge-sm {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 10px;
      color: white;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .rank-top { font-size: 1.2rem; }

    .no-scores {
      text-align: center;
      color: #aaa;
      padding: 40px 0;
      font-size: 1rem;
    }

    .lb-highlight td { background: #fffbea; }

    /* ============================================================
       GAME SCREEN
    ============================================================ */
    #game-screen {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      flex-shrink: 0;
      height: 52px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.2);
      padding: 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hdr-btn {
      background: rgba(255,255,255,0.18);
      color: white;
      border: none;
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.18s;
      flex-shrink: 0;
    }

    .hdr-btn:hover { background: rgba(255,255,255,0.35); }
    .hdr-btn.muted { opacity: 0.38; }

    .hdr-level {
      padding: 4px 11px;
      border-radius: 12px;
      color: white;
      font-size: 0.8rem;
      font-weight: 700;
      white-space: nowrap;
    }

    #hdr-player {
      color: rgba(255,255,255,0.9);
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100px;
    }

    .hdr-spacer { flex: 1; }

    .stats { display: flex; gap: 6px; }

    .stat-chip {
      background: rgba(255,255,255,0.2);
      color: white;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      white-space: nowrap;
    }

    /* Board */
    #board {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(var(--cols), 1fr);
      grid-template-rows:    repeat(var(--rows), 1fr);
      gap:     var(--gap);
      padding: var(--pad);
    }

    /* ===== CARD ===== */
    .card {
      cursor: pointer;
      perspective: 1000px;
      user-select: none;
      min-width: 0; min-height: 0;
    }

    .card-inner {
      position: relative;
      width: 100%; height: 100%;
      transition: transform 0.46s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }

    .card.flipped .card-inner,
    .card.matched .card-inner { transform: rotateY(180deg); }

    .card-front, .card-back {
      position: absolute; inset: 0;
      border-radius: 10px;
      overflow: hidden;
      backface-visibility: hidden;
    }

    .card-front {
      background: linear-gradient(145deg, #4a90d9 0%, #7b68ee 55%, #9b59b6 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      box-shadow: 0 3px 10px rgba(0,0,0,0.22);
      border: 2px solid rgba(255,255,255,0.35);
      transition: box-shadow 0.18s, border-color 0.18s;
    }

    .card:hover:not(.flipped):not(.matched) .card-front {
      box-shadow: 0 5px 18px rgba(0,0,0,0.38);
      border-color: rgba(255,255,255,0.65);
    }

    .card-back {
      transform: rotateY(180deg);
      background: white;
      display: flex; flex-direction: column;
      box-shadow: 0 3px 10px rgba(0,0,0,0.22);
      border: 2px solid rgba(255,255,255,0.5);
    }

    .card-back img {
      width: 100%; flex: 1;
      object-fit: cover;
      min-height: 0; display: block;
    }

    .card-name {
      padding: 2px 4px;
      text-align: center;
      font-size: 0.62rem;
      font-weight: 700;
      color: #333;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card.matched .card-back {
      border-color: #2ecc71;
      box-shadow: 0 0 14px rgba(46,204,113,0.6);
    }

    .card.wrong .card-inner { animation: shake 0.4s ease; }

    @keyframes shake {
      0%,100% { transform: rotateY(180deg) translateX(0); }
      25%     { transform: rotateY(180deg) translateX(-7px); }
      75%     { transform: rotateY(180deg) translateX(7px); }
    }

    .img-fallback {
      width: 100%; flex: 1;
      display: none;
      align-items: center; justify-content: center;
      font-size: 1.6rem; font-weight: bold; color: white;
    }

    /* ============================================================
       COUNTDOWN OVERLAY
    ============================================================ */
    #countdown-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 500;
      backdrop-filter: blur(3px);
    }

    .countdown-box {
      text-align: center;
      color: white;
    }

    .countdown-box p {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 12px;
      text-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }

    #countdown-num {
      font-size: 5rem;
      font-weight: 900;
      line-height: 1;
      text-shadow: 0 4px 16px rgba(0,0,0,0.5);
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.12); }
    }

    /* ============================================================
       WIN SCREEN
    ============================================================ */
    #win-screen {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(6px);
    }

    .win-box {
      background: white;
      border-radius: 22px;
      padding: 34px 28px;
      text-align: center;
      max-width: 340px; width: 90%;
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
      animation: popIn 0.42s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes popIn {
      from { transform: scale(0.4); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .win-box .trophy { font-size: 3rem; }
    .win-box h2 { font-size: 1.6rem; color: #2ecc71; margin: 8px 0 14px; }
    .win-box p  { font-size: 0.95rem; color: #555; margin-bottom: 6px; }
    .win-box strong { color: #333; }

    .win-btns { display: flex; gap: 8px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }

    .win-btns button {
      background: #667eea; color: white;
      border: none; padding: 9px 16px;
      border-radius: 16px; cursor: pointer;
      font-size: 0.88rem; font-family: inherit; font-weight: 600;
      transition: background 0.18s, transform 0.1s;
    }

    .win-btns button:hover { transform: scale(1.04); }
    .win-btns .btn-again  { background: #667eea; }
    .win-btns .btn-again:hover  { background: #764ba2; }
    .win-btns .btn-next   { background: #e74c3c; }
    .win-btns .btn-next:hover   { background: #c0392b; }
    .win-btns .btn-home   { background: #7f8c8d; }
    .win-btns .btn-home:hover   { background: #636e72; }
    .win-btns .btn-lb     { background: #f39c12; }
    .win-btns .btn-lb:hover     { background: #d68910; }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 500px) {
      .start-card { padding: 24px 18px; }
      .start-card h1 { font-size: 1.2rem; }
      header { gap: 5px; padding: 0 8px; }
      .stats { gap: 4px; }
      .stat-chip { padding: 3px 7px; font-size: 0.75rem; }
      :root { --gap: 5px; --pad: 6px; }
    }
  </style>
</head>
<body>

<!-- ============================================================
     START SCREEN
============================================================ -->
<div id="start-screen">
  <div class="start-card">
    <div class="start-logo">🎴</div>
    <h1>משחק הזיכרון המשפחתי</h1>

    <label class="field-label" for="player-name">מה השם שלך?</label>
    <input type="text" id="player-name" placeholder="הכניסו שם..." maxlength="20" autocomplete="off">

    <span class="start-levels-label">בחרו רמת קושי:</span>
    <div class="start-level-btns">
      <button class="start-level-btn" data-level="easy">
        ⭐ קל<small>6 זוגות · 12 קלפים</small>
      </button>
      <button class="start-level-btn" data-level="medium">
        ⭐⭐ בינוני<small>10 זוגות · 20 קלפים</small>
      </button>
      <button class="start-level-btn" data-level="hard">
        ⭐⭐⭐ קשה<small>15 זוגות · 30 קלפים</small>
      </button>
    </div>

    <button id="start-game-btn">התחילו משחק ▶</button>
    <button id="show-lb-btn" style="margin-top:10px">🏆 טבלת הישגים</button>
  </div>
</div>

<!-- ============================================================
     LEADERBOARD SCREEN
============================================================ -->
<div id="leaderboard-screen" class="hidden">
  <div style="height:100vh;display:flex;align-items:center;justify-content:center;padding:16px">
    <div class="lb-card">
      <div class="lb-header">
        <h2>🏆 טבלת הישגים</h2>
        <div class="lb-top-btns">
          <button class="btn-ghost danger" id="clear-scores-btn">🗑️ נקה הכל</button>
          <button class="btn-ghost" id="back-to-start-btn">← חזור</button>
        </div>
      </div>

      <div class="lb-tabs">
        <button class="lb-tab active" data-filter="all">הכל</button>
        <button class="lb-tab" data-filter="easy">⭐ קל</button>
        <button class="lb-tab" data-filter="medium">⭐⭐ בינוני</button>
        <button class="lb-tab" data-filter="hard">⭐⭐⭐ קשה</button>
      </div>

      <div id="lb-content"></div>
    </div>
  </div>
</div>

<!-- ============================================================
     GAME SCREEN
============================================================ -->
<div id="game-screen" class="hidden">
  <header>
    <button class="hdr-btn" id="home-btn" title="חזור לתחילה">🏠</button>
    <span class="hdr-level" id="hdr-level">⭐ קל</span>
    <span id="hdr-player"></span>
    <div class="hdr-spacer"></div>
    <div class="stats">
      <span class="stat-chip">⏱️ <span id="timer">00:00</span></span>
      <span class="stat-chip">🔄 <span id="moves">0</span></span>
      <span class="stat-chip">❤️ <span id="pairs">0</span>/<span id="total-pairs">6</span></span>
    </div>
    <button class="hdr-btn" id="sfx-btn"     title="צלילים">🔊</button>
    <button class="hdr-btn" id="music-btn"   title="מוזיקה">🎵</button>
    <button class="hdr-btn" id="restart-btn" title="התחל מחדש">↺</button>
  </header>

  <div id="board"></div>
</div>

<!-- ============================================================
     COUNTDOWN OVERLAY
============================================================ -->
<div id="countdown-overlay" class="hidden">
  <div class="countdown-box">
    <p>זכרו את הקלפים! 👀</p>
    <div id="countdown-num">3</div>
  </div>
</div>

<!-- ============================================================
     WIN SCREEN
============================================================ -->
<div id="win-screen" class="hidden">
  <div class="win-box">
    <div class="trophy">🏆</div>
    <h2>כל הכבוד!</h2>
    <p id="win-msg"></p>
    <p>⏱️ זמן: <strong id="final-time"></strong></p>
    <p>🔄 ניחושים: <strong id="final-moves"></strong></p>
    <div class="win-btns">
      <button class="btn-again" id="btn-again">↺ שוב</button>
      <button class="btn-next" id="btn-next" style="display:none"></button>
      <button class="btn-lb"   id="btn-win-lb">🏆 הישגים</button>
      <button class="btn-home" id="btn-win-home">🏠 תפריט</button>
    </div>
  </div>
</div>

<script>
// ============================================================
//  כל 19 הדמויות
// ============================================================
const ALL_CARDS = [
  { src: 'images/איה.png',         name: 'איה'         },
  { src: 'images/עופר.png',        name: 'עופר'        },
  { src: 'images/ספיר.png',        name: 'ספיר'        },
  { src: 'images/דרור.png',        name: 'דרור'        },
  { src: 'images/עומר.png',        name: 'עומר'        },
  { src: 'images/אורי.png',        name: 'אורי'        },
  { src: 'images/שני.png',         name: 'שני'         },
  { src: 'images/אילן.png',        name: 'אילן'        },
  { src: 'images/גליה.png',        name: 'גליה'        },
  { src: 'images/קרן.png',         name: 'קרן'         },
  { src: 'images/אור.png',         name: 'אור'         },
  { src: 'images/נועה.png',        name: 'נועה'        },
  { src: 'images/עומר ל.png',      name: 'עומר ל'      },
  { src: 'images/עופרי.png',       name: 'עופרי'       },
  { src: 'images/גוי.png',         name: 'גוי'         },
  { src: 'images/אפולו.png',       name: 'אפולו'       },
  { src: 'images/סבתא שושנה.png',  name: 'סבתא שושנה' },
  { src: 'images/סבתא שושיק.png',  name: 'סבתא שושיק' },
  { src: 'images/מרי.png',         name: 'מרי'         },
];

// ============================================================
//  רמות: זוגות, עמודות, שורות, זמן חשיפה (שניות)
//  12=4×3 | 20=5×4 | 30=6×5
// ============================================================
const LEVELS = {
  easy:   { pairs:6,  cols:4, rows:3, peek:3, label:'קל',    color:'#27ae60', stars:'⭐'       },
  medium: { pairs:10, cols:5, rows:4, peek:2, label:'בינוני', color:'#e67e22', stars:'⭐⭐'     },
  hard:   { pairs:15, cols:6, rows:5, peek:2, label:'קשה',   color:'#c0392b', stars:'⭐⭐⭐'   },
};
const LEVEL_ORDER = ['easy','medium','hard'];

const COLORS = [
  '#e74c3c','#e67e22','#f39c12','#2ecc71','#1abc9c',
  '#3498db','#9b59b6','#e91e63','#ff5722','#795548',
  '#607d8b','#d35400','#27ae60','#2980b9','#8e44ad',
];

// ============================================================
//  LEADERBOARD (localStorage)
// ============================================================
const LS_KEY = 'memory-family-v1';

function getScores() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
  catch { return []; }
}

function saveScore(entry) {
  const scores = getScores();
  scores.push(entry);
  localStorage.setItem(LS_KEY, JSON.stringify(scores));
}

function clearScores() {
  localStorage.removeItem(LS_KEY);
}

function fmt(s) {
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}

function renderLeaderboard(filter = 'all') {
  let scores = getScores();
  if (filter !== 'all') scores = scores.filter(s => s.level === filter);
  scores.sort((a,b) => a.seconds - b.seconds || a.moves - b.moves);

  const medals = ['🥇','🥈','🥉'];
  const el = document.getElementById('lb-content');

  if (scores.length === 0) {
    el.innerHTML = '<p class="no-scores">אין תוצאות עדיין 🎮<br>שחקו ותרשמו לטבלה!</p>';
    return;
  }

  const rows = scores.map((s,i) => {
    const lv = LEVELS[s.level] || { color:'#999', label: s.level };
    const isMe = (s.name === playerName);
    return `<tr class="${isMe ? 'lb-highlight' : ''}">
      <td class="rank-top">${medals[i] || (i+1)}</td>
      <td>${escHtml(s.name)}</td>
      <td><span class="level-badge-sm" style="background:${lv.color}">${lv.label}</span></td>
      <td>${fmt(s.seconds)}</td>
      <td>${s.moves}</td>
      <td>${s.date}</td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <table class="lb-table">
      <thead><tr>
        <th>מקום</th><th style="text-align:right">שם</th><th>רמה</th>
        <th>⏱️ זמן</th><th>🔄 ניחושים</th><th>תאריך</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ============================================================
//  AUDIO SYSTEM
// ============================================================
let sfxEnabled   = true;
let musicEnabled = true;

// צלילי אפקטים
const SFX = {
  start: new Audio('sounds/game start.mp3'),
  match: new Audio('sounds/correct.mp3'),
  wrong: new Audio('sounds/incorrcet.mp3'),
  win:   new Audio('sounds/end game.mp3'),
};
SFX.start.volume = 0.8;
SFX.match.volume = 0.7;
SFX.wrong.volume = 0.7;
SFX.win.volume   = 0.8;

function playAudio(snd) {
  if (!sfxEnabled) return;
  snd.currentTime = 0;
  snd.play().catch(() => {});
}

function playSfxStart() { playAudio(SFX.start); }
function playSfxMatch() { playAudio(SFX.match); }
function playSfxWrong() { playAudio(SFX.wrong); }
function playSfxWin()   { playAudio(SFX.win);   }

// מוזיקת רקע
const bgMusic = new Audio('sounds/background suond.mp3');
bgMusic.loop   = true;
bgMusic.volume = 0.35;

function startMusic() {
  if (!musicEnabled) return;
  bgMusic.play().catch(() => {});
}

function stopMusic() {
  bgMusic.pause();
  bgMusic.currentTime = 0;
}

function updateAudioBtns() {
  document.getElementById('sfx-btn').classList.toggle('muted', !sfxEnabled);
  document.getElementById('music-btn').classList.toggle('muted', !musicEnabled);
}

// ============================================================
//  SCREEN MANAGER
// ============================================================
function showScreen(name) {
  ['start-screen','leaderboard-screen','game-screen'].forEach(id => {
    document.getElementById(id).classList.toggle('hidden', id !== name);
  });
}

// ============================================================
//  GAME STATE
// ============================================================
let playerName    = '';
let currentLevel  = 'easy';
let flipped       = [];
let matched       = 0;
let moves         = 0;
let locked        = false;
let started       = false;
let timerID       = null;
let seconds       = 0;
let totalPairs    = 0;

function startTimer() {
  if (timerID) return;
  timerID = setInterval(() => {
    seconds++;
    document.getElementById('timer').textContent = fmt(seconds);
  }, 1000);
}

function stopTimer() { clearInterval(timerID); timerID = null; }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// ============================================================
//  BUILD CARD
// ============================================================
function buildCard(data, pairIdx) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.pair = pairIdx;
  const color = COLORS[pairIdx % COLORS.length];

  card.innerHTML = `
    <div class="card-inner">
      <div class="card-front">🤍</div>
      <div class="card-back">
        <img src="${data.src}" alt="${data.name}"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="img-fallback" style="background:${color}">${data.name.charAt(0)}</div>
        <div class="card-name">${data.name}</div>
      </div>
    </div>`;

  card.addEventListener('click', () => onFlip(card));
  return card;
}

// ============================================================
//  FLIP LOGIC
// ============================================================
function onFlip(card) {
  if (locked || card.classList.contains('flipped') || card.classList.contains('matched')) return;
  if (!started) { started = true; startTimer(); }

  card.classList.add('flipped');
  flipped.push(card);

  if (flipped.length === 2) {
    moves++;
    document.getElementById('moves').textContent = moves;
    locked = true;
    checkPair();
  }
}

function checkPair() {
  const [a,b] = flipped;
  if (a.dataset.pair === b.dataset.pair) {
    playSfxMatch();
    a.classList.add('matched'); b.classList.add('matched');
    matched++;
    document.getElementById('pairs').textContent = matched;
    flipped = []; locked = false;
    if (matched === totalPairs) { stopTimer(); setTimeout(showWin, 600); }
  } else {
    playSfxWrong();
    a.classList.add('wrong'); b.classList.add('wrong');
    setTimeout(() => {
      a.classList.remove('flipped','wrong');
      b.classList.remove('flipped','wrong');
      flipped = []; locked = false;
    }, 900);
  }
}

// ============================================================
//  WIN SCREEN
// ============================================================
function showWin() {
  const lv = LEVELS[currentLevel];
  const nextIdx = LEVEL_ORDER.indexOf(currentLevel) + 1;

  // Save to leaderboard
  const today = new Date().toLocaleDateString('he-IL');
  saveScore({ name: playerName, level: currentLevel, seconds, moves, date: today });

  document.getElementById('win-msg').textContent =
    `${playerName}, מצאת את כל ${totalPairs} הזוגות ברמה ${lv.label}!`;
  document.getElementById('final-time').textContent  = fmt(seconds);
  document.getElementById('final-moves').textContent = moves;

  const btnNext = document.getElementById('btn-next');
  if (nextIdx < LEVEL_ORDER.length) {
    btnNext.style.display = '';
    btnNext.textContent = `${LEVELS[LEVEL_ORDER[nextIdx]].stars} ${LEVELS[LEVEL_ORDER[nextIdx]].label} ▶`;
    btnNext._nextLevel = LEVEL_ORDER[nextIdx];
  } else {
    btnNext.style.display = 'none';
  }

  stopMusic();
  playSfxWin();
  document.getElementById('win-screen').classList.remove('hidden');
}

// ============================================================
//  REVEAL PHASE (cards shown briefly, then flipped back)
// ============================================================
function revealThenStart(peekSeconds) {
  locked = true;
  const cards = document.querySelectorAll('.card');

  // Show all cards face-up (after 1 frame so CSS transition applies)
  requestAnimationFrame(() => requestAnimationFrame(() => {
    cards.forEach(c => c.classList.add('flipped'));
  }));

  // Show countdown overlay
  const overlay = document.getElementById('countdown-overlay');
  const numEl   = document.getElementById('countdown-num');
  overlay.classList.remove('hidden');
  numEl.textContent = peekSeconds;

  let count = peekSeconds;
  const interval = setInterval(() => {
    count--;
    if (count > 0) {
      numEl.textContent = count;
    } else {
      clearInterval(interval);
      overlay.classList.add('hidden');
      // Flip all cards back
      cards.forEach(c => c.classList.remove('flipped'));
      // Unlock after flip animation finishes
      setTimeout(() => { locked = false; }, 500);
    }
  }, 1000);
}

// ============================================================
//  INIT GAME
// ============================================================
function initGame(level) {
  if (level) currentLevel = level;

  stopTimer();
  flipped=[]; matched=0; moves=0; seconds=0;
  locked=false; started=false;

  document.getElementById('timer').textContent  = '00:00';
  document.getElementById('moves').textContent  = '0';
  document.getElementById('pairs').textContent  = '0';
  document.getElementById('win-screen').classList.add('hidden');

  const lv = LEVELS[currentLevel];
  totalPairs = lv.pairs;
  document.getElementById('total-pairs').textContent = totalPairs;

  // Update header
  const hdrLvl = document.getElementById('hdr-level');
  hdrLvl.textContent = `${lv.stars} ${lv.label}`;
  hdrLvl.style.background = lv.color;
  document.getElementById('hdr-player').textContent = playerName;

  // Update CSS grid
  document.documentElement.style.setProperty('--cols', lv.cols);
  document.documentElement.style.setProperty('--rows', lv.rows);

  // Build deck
  const selected = shuffle(ALL_CARDS).slice(0, lv.pairs);
  const deck = [];
  selected.forEach((card,i) => {
    deck.push({...card, pairIdx:i});
    deck.push({...card, pairIdx:i});
  });

  const board = document.getElementById('board');
  board.innerHTML = '';
  shuffle(deck).forEach(d => board.appendChild(buildCard(d, d.pairIdx)));

  showScreen('game-screen');
  stopMusic();
  startMusic();
  revealThenStart(lv.peek);
}

// ============================================================
//  START SCREEN LOGIC
// ============================================================
let selectedLevel = '';

document.querySelectorAll('.start-level-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.start-level-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedLevel = btn.dataset.level;
  });
});

document.getElementById('start-game-btn').addEventListener('click', () => {
  const nameInput = document.getElementById('player-name');
  playerName = nameInput.value.trim();
  if (!playerName) { nameInput.focus(); nameInput.placeholder = '⚠️ נא להכניס שם'; return; }
  if (!selectedLevel) {
    document.querySelectorAll('.start-level-btn').forEach(b => b.style.animation = 'pulse-border 0.4s ease');
    setTimeout(() => document.querySelectorAll('.start-level-btn').forEach(b => b.style.animation = ''), 400);
    return;
  }
  playSfxStart();
  initGame(selectedLevel);
});

document.getElementById('show-lb-btn').addEventListener('click', () => {
  renderLeaderboard('all');
  document.querySelectorAll('.lb-tab').forEach(t => t.classList.toggle('active', t.dataset.filter==='all'));
  showScreen('leaderboard-screen');
});

// ============================================================
//  LEADERBOARD SCREEN LOGIC
// ============================================================
document.querySelectorAll('.lb-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.lb-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderLeaderboard(tab.dataset.filter);
  });
});

document.getElementById('back-to-start-btn').addEventListener('click', () => showScreen('start-screen'));

document.getElementById('clear-scores-btn').addEventListener('click', () => {
  if (confirm('למחוק את כל ההישגים?')) {
    clearScores();
    renderLeaderboard(document.querySelector('.lb-tab.active').dataset.filter);
  }
});

// ============================================================
//  GAME SCREEN BUTTONS
// ============================================================
document.getElementById('home-btn').addEventListener('click', () => {
  stopTimer();
  stopMusic();
  showScreen('start-screen');
});

document.getElementById('sfx-btn').addEventListener('click', () => {
  sfxEnabled = !sfxEnabled;
  updateAudioBtns();
});

document.getElementById('music-btn').addEventListener('click', () => {
  musicEnabled = !musicEnabled;
  if (musicEnabled) startMusic(); else stopMusic();
  updateAudioBtns();
});

document.getElementById('restart-btn').addEventListener('click', () => initGame());

// ============================================================
//  WIN SCREEN BUTTONS
// ============================================================
document.getElementById('btn-again').addEventListener('click', () => {
  document.getElementById('win-screen').classList.add('hidden');
  initGame();
});

document.getElementById('btn-next').addEventListener('click', function() {
  document.getElementById('win-screen').classList.add('hidden');
  initGame(this._nextLevel);
});

document.getElementById('btn-win-lb').addEventListener('click', () => {
  document.getElementById('win-screen').classList.add('hidden');
  renderLeaderboard('all');
  document.querySelectorAll('.lb-tab').forEach(t => t.classList.toggle('active', t.dataset.filter==='all'));
  showScreen('leaderboard-screen');
});

document.getElementById('btn-win-home').addEventListener('click', () => {
  document.getElementById('win-screen').classList.add('hidden');
  stopTimer();
  showScreen('start-screen');
});

// ============================================================
//  START — show start screen
// ============================================================
showScreen('start-screen');
</script>
